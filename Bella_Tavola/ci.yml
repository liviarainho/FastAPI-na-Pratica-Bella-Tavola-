name: CI Completo — Bella Tavola

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar-sintaxe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar Linters
        run: pip install black autoflake
      - name: Check Unused Imports
        run: autoflake --check --remove-all-unused-imports -r .
      - name: Check Formatting
        run: black --check .

  verificar-api:
    runs-on: ubuntu-latest
    needs: verificar-sintaxe # SÓ RODA SE O ANTERIOR PASSAR
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install All
        run: pip install -r requirements.txt
      - name: Test Server
        run: |
          uvicorn main:app &
          sleep 5
          curl --fail http://localhost:8000/
  integracao:
    needs: testes-smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache do Modelo
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-v1-${{ hashFiles('requirements.txt') }}
      - name: Rodar Testes de Modelo
        run: pytest tests/ -m integracao -v
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}